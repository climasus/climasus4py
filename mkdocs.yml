site_name: climasus4py
site_description: Fast SUS and climate data workflows for Brazil — Python edition
site_url: https://climasus.github.io/climasus4py/
repo_url: https://github.com/climasus/climasus4py
repo_name: climasus/climasus4py
docs_dir: docs
site_dir: site

# ---------------------------------------------------------------------------
# Theme — Material with CLIMA-SUS identity
# ---------------------------------------------------------------------------
theme:
  name: material
  custom_dir: docs/overrides
  language: pt
  logo: assets/logo.png
  favicon: assets/logo.png

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

# ---------------------------------------------------------------------------
# Custom CLIMA-SUS colors (via extra CSS)
# ---------------------------------------------------------------------------
extra_css:
  - https://climasus.github.io/design-system/assets/css/theme.css
  - stylesheets/climasus-extras.css

extra_javascript:
  - assets/climasus.js

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search:
      lang:
        - pt
        - en
        - es
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_submodules: false
            members_order: source

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      title: Nesta página

# ---------------------------------------------------------------------------
# Extra
# ---------------------------------------------------------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/climasus
      name: climasus no GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/climasus4py/
      name: climasus4py no PyPI
  version:
    provider: mike

copyright: "© 2024 CLIMA-SUS — MIT License"

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - "Referência API": reference/
  - Português:
      - pt/index.md
  - English:
      - en/index.md
  - Español:
      - es/index.md
